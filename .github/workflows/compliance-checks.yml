name: Workspace compliance checks

on:
  pull_request:
    paths:
      - '**.md'
      - '**.tf'
      - '**.tfvars.example'
      - 'CLAUDE.md'
      - '.github/workflows/compliance-checks.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        # Scripts are vendored from juro-platform/scripts/. juro-platform
        # is private, so cross-repo checkout would require a PAT secret.
        # Re-vendor when the canonical list changes in juro-platform.
        run: chmod +x .github/scripts/check-banned-claims.sh .github/scripts/check-agent-preamble.sh

      - name: Run banned-claims check
        run: |
          set -e
          files=()
          # CLAUDE.md is an agent instruction file, not a marketing surface —
          # it legitimately quotes banned phrases in their prohibited context.
          [[ -f README.md ]] && files+=("README.md")
          if [[ ${#files[@]} -gt 0 ]]; then
            .github/scripts/check-banned-claims.sh "${files[@]}"
          else
            echo "No marketing-surface files found — skipping banned-claims check"
          fi

      - name: Run agent-preamble check
        run: .github/scripts/check-agent-preamble.sh CLAUDE.md
